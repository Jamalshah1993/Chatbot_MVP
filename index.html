<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggleable Window Container</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <header>
    <h1>Toggleable Window Container Example</h1>
  </header>
  <div class="container">
    <button id="toggleButton">Toggle Window</button>
    <div class="window-container" id="windowContainer">
      <h2>Window Content</h2>
      <p>This is the content of the toggleable window.</p>
    </div>
  </div>

  <script src="scripts/main.js"></script>
</body>
</html>
